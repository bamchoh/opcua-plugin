syntax = "proto3";

package plugin.v1;

option go_package = "modbus_simulator/pb/pluginpb";

// =============================================================================
// 共通型
// =============================================================================

message Empty {}

// =============================================================================
// プラグイン側が実装する gRPC サービス
// =============================================================================

// PluginService: ファクトリー系メタデータ + サーバーライフサイクル管理
service PluginService {
  // ファクトリー系（メタデータ・スキーマ）
  rpc GetMetadata(Empty) returns (PluginMetadata);
  rpc GetConfigVariants(Empty) returns (GetConfigVariantsResponse);
  rpc GetConfigFields(GetConfigFieldsRequest) returns (GetConfigFieldsResponse);
  rpc GetDefaultConfig(GetDefaultConfigRequest) returns (ConfigDataResponse);
  rpc MapToConfig(MapToConfigRequest) returns (MapToConfigResponse);
  rpc ConfigToMap(ConfigToMapRequest) returns (ConfigToMapResponse);

  // サーバーライフサイクル
  // CreateAndStart: サーバーを作成して起動する。host_grpc_addr は
  // SupportsNodePublishing=true の場合に VariableAccessorService への接続先として使用する
  rpc CreateAndStart(CreateAndStartRequest) returns (Empty);
  rpc Stop(Empty) returns (Empty);
  rpc GetStatus(Empty) returns (StatusResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (Empty);

  // ノード公開設定変更通知（SupportsNodePublishing=true のプロトコル用）
  rpc OnNodePublishingUpdated(Empty) returns (Empty);

  // UnitID 管理（SupportsUnitID=true のプロトコル用）
  rpc GetUnitIDSettings(Empty) returns (UnitIDSettingsResponse);
  rpc SetUnitIDEnabled(SetUnitIDEnabledRequest) returns (Empty);
  rpc SetDisabledUnitIDs(SetDisabledUnitIDsRequest) returns (Empty);
}

// DataStoreService: プラグイン内の DataStore への読み書き
service DataStoreService {
  rpc GetAreas(Empty) returns (GetAreasResponse);
  rpc ReadBit(ReadBitRequest) returns (ReadBitResponse);
  rpc WriteBit(WriteBitRequest) returns (Empty);
  rpc ReadBits(ReadBitsRequest) returns (ReadBitsResponse);
  rpc WriteBits(WriteBitsRequest) returns (Empty);
  rpc ReadWord(ReadWordRequest) returns (ReadWordResponse);
  rpc WriteWord(WriteWordRequest) returns (Empty);
  rpc ReadWords(ReadWordsRequest) returns (ReadWordsResponse);
  rpc WriteWords(WriteWordsRequest) returns (Empty);
  rpc Snapshot(Empty) returns (SnapshotResponse);
  rpc Restore(RestoreRequest) returns (Empty);
  rpc ClearAll(Empty) returns (Empty);
  // SubscribeChanges: プロトコルクライアント（Modbus クライアント等）が書き込んだ
  // 変更のみを通知する。ホストからの WriteWord/WriteWords による書き込みは通知しない（循環防止）
  rpc SubscribeChanges(Empty) returns (stream DataChange);
}

// =============================================================================
// ホスト側が実装する gRPC サービス（OPC UA 等、SupportsNodePublishing=true 向け）
// =============================================================================

// VariableAccessorService: ホストの VariableStore への変数アクセス
service VariableAccessorService {
  rpc GetEnabledNodePublishings(GetNodePublishingsRequest) returns (GetNodePublishingsResponse);
  // value_json には変数値を JSON シリアライズした文字列を使用する
  rpc ReadVariableValue(ReadVariableValueRequest) returns (ReadVariableValueResponse);
  rpc WriteVariableValue(WriteVariableValueRequest) returns (Empty);
  rpc GetStructFields(GetStructFieldsRequest) returns (GetStructFieldsResponse);
  // SubscribeVariableChanges: ホストの VariableStore 変更をプラグインに通知する
  // OPC UA サブスクリプション更新等に使用する
  rpc SubscribeVariableChanges(Empty) returns (stream VariableChange);
}

// =============================================================================
// PluginService メッセージ型
// =============================================================================

message PluginMetadata {
  string protocol_type = 1;
  string display_name = 2;
  ProtocolCapabilities capabilities = 3;
}

message ProtocolCapabilities {
  bool supports_unit_id = 1;
  int32 unit_id_min = 2;
  int32 unit_id_max = 3;
  bool supports_node_publishing = 4;
}

message ConfigVariant {
  string id = 1;
  string display_name = 2;
}

message GetConfigVariantsResponse {
  repeated ConfigVariant variants = 1;
}

message GetConfigFieldsRequest {
  string variant_id = 1;
}

message ConfigField {
  string name = 1;
  string label = 2;
  string type = 3;       // "text", "number", "select", "checkbox"
  bool required = 4;
  string default_json = 5; // JSON シリアライズされたデフォルト値
  repeated FieldOption options = 6;
  bool has_min = 7;
  int32 min = 8;
  bool has_max = 9;
  int32 max = 10;
  FieldCondition condition = 11;
}

message FieldOption {
  string value = 1;
  string label = 2;
}

message FieldCondition {
  string field = 1;
  string value = 2;
}

message GetConfigFieldsResponse {
  repeated ConfigField fields = 1;
}

message GetDefaultConfigRequest {
  string variant_id = 1;
}

message ConfigDataResponse {
  string variant_id = 1;
  string settings_json = 2; // map[string]interface{} を JSON シリアライズ
}

message MapToConfigRequest {
  string variant_id = 1;
  string settings_json = 2;
}

message MapToConfigResponse {
  string variant_id = 1;
  string settings_json = 2;
  string error = 3; // 空文字列ならエラーなし
}

message ConfigToMapRequest {
  string variant_id = 1;
  string settings_json = 2;
}

message ConfigToMapResponse {
  string settings_json = 1;
}

message CreateAndStartRequest {
  string variant_id = 1;
  string settings_json = 2;
  // SupportsNodePublishing=true の場合、ホストの VariableAccessorService の gRPC アドレス
  string host_grpc_addr = 3;
}

message StatusResponse {
  // "Stopped", "Running", "Error"
  string status = 1;
  string error_message = 2;
}

message UpdateConfigRequest {
  string variant_id = 1;
  string settings_json = 2;
}

message UnitIDSettingsResponse {
  int32 min = 1;
  int32 max = 2;
  repeated int32 disabled_ids = 3;
}

message SetUnitIDEnabledRequest {
  int32 unit_id = 1;
  bool enabled = 2;
}

message SetDisabledUnitIDsRequest {
  repeated int32 ids = 1;
}

// =============================================================================
// DataStoreService メッセージ型
// =============================================================================

message MemoryArea {
  string id = 1;
  string display_name = 2;
  bool is_bit = 3;
  uint32 size = 4;
  bool read_only = 5;
  bool byte_addressing = 6;
  bool one_origin = 7;
}

message GetAreasResponse {
  repeated MemoryArea areas = 1;
}

message ReadBitRequest {
  string area = 1;
  uint32 address = 2;
}

message ReadBitResponse {
  bool value = 1;
}

message WriteBitRequest {
  string area = 1;
  uint32 address = 2;
  bool value = 3;
}

message ReadBitsRequest {
  string area = 1;
  uint32 address = 2;
  uint32 count = 3;
}

message ReadBitsResponse {
  repeated bool values = 1;
}

message WriteBitsRequest {
  string area = 1;
  uint32 address = 2;
  repeated bool values = 3;
}

message ReadWordRequest {
  string area = 1;
  uint32 address = 2;
}

message ReadWordResponse {
  // uint16 を uint32 で表現
  uint32 value = 1;
}

message WriteWordRequest {
  string area = 1;
  uint32 address = 2;
  // uint16 を uint32 で表現
  uint32 value = 3;
}

message ReadWordsRequest {
  string area = 1;
  uint32 address = 2;
  uint32 count = 3;
}

message ReadWordsResponse {
  // uint16 を uint32 で表現
  repeated uint32 values = 1;
}

message WriteWordsRequest {
  string area = 1;
  uint32 address = 2;
  // uint16 を uint32 で表現
  repeated uint32 values = 3;
}

message SnapshotResponse {
  // map[string]interface{} を JSON シリアライズ
  bytes snapshot_json = 1;
}

message RestoreRequest {
  bytes snapshot_json = 1;
}

// DataChange: プロトコルクライアントが書き込んだ変更通知
message DataChange {
  string area = 1;
  uint32 address = 2;
  // ワード変更の場合: values に uint16 を uint32 で格納
  repeated uint32 values = 3;
  // ビット変更の場合: is_bit=true + bit_values を使用
  bool is_bit = 4;
  repeated bool bit_values = 5;
}

// =============================================================================
// VariableAccessorService メッセージ型
// =============================================================================

message GetNodePublishingsRequest {
  string protocol_type = 1;
}

message NodePublishingInfo {
  string variable_id = 1;
  string variable_name = 2;
  string data_type = 3;   // "INT", "REAL", "STRING[20]" 等
  string access_mode = 4; // "read", "write", "readwrite"
}

message GetNodePublishingsResponse {
  repeated NodePublishingInfo publishings = 1;
}

message ReadVariableValueRequest {
  string variable_id = 1;
}

message ReadVariableValueResponse {
  // 変数値を JSON シリアライズした文字列
  string value_json = 1;
  string error = 2; // 空文字列ならエラーなし
}

message WriteVariableValueRequest {
  string variable_id = 1;
  string value_json = 2;
}

message GetStructFieldsRequest {
  string type_name = 1;
}

message StructFieldInfo {
  string name = 1;
  string data_type = 2;
}

message GetStructFieldsResponse {
  repeated StructFieldInfo fields = 1;
}

// VariableChange: ホストの VariableStore 変更通知
message VariableChange {
  string variable_id = 1;
  string value_json = 2;
}
